extend type Mutation {
  """Create a service and trigger its first deployment. The service name becomes {name}.ml.ink. Returns immediately while build runs async — poll serviceGet to track status."""
  serviceCreate(input: CreateServiceInput!): CreateServiceResult!
  """Permanently delete a service and tear down its container, DNS, and custom domain."""
  serviceDelete(name: String!, project: String, workspaceSlug: String): DeleteServiceResult!
  """Update service configuration and trigger a redeployment. Only specified fields change. Can also redeploy without changes to pull latest code."""
  serviceUpdate(input: UpdateServiceInput!): UpdateServiceResult!
  """Set env vars on a service. Merges with existing — new values override, unmentioned vars are preserved unless replace=true."""
  serviceSetSecrets(input: SetSecretsInput!): SetSecretsResult!
  """Remove specific env var keys from a service. Triggers a redeploy."""
  serviceDeleteSecrets(input: DeleteSecretsInput!): SetSecretsResult!
  """Remove a single env var from a service. Triggers a redeploy."""
  serviceUnsetSecret(name: String!, key: String!, project: String, workspaceSlug: String): SetSecretsResult!
}

input SetSecretsInput {
  name: String!
  project: String
  workspaceSlug: String
  envVars: [EnvVarInput!]!
  replace: Boolean = false
}

input DeleteSecretsInput {
  name: String!
  project: String
  workspaceSlug: String
  keys: [String!]!
}

type SetSecretsResult {
  serviceId: ID!
  name: String!
  status: String!
}

input CreateServiceInput {
  """Service name — becomes the subdomain at {name}.ml.ink."""
  name: String!
  """Repository reference as returned by repoCreate (e.g. 'my-app' for internal, 'user/repo' for GitHub). Not a URL."""
  repo: String!
  """Git host: 'ink' for internal git, 'github' for GitHub repos."""
  host: String = "ink"
  """Branch to deploy."""
  branch: String = "main"
  """Project slug to deploy into."""
  project: String = "default"
  """Workspace slug. Omit to use your personal workspace."""
  workspaceSlug: String
  """Build strategy: 'railpack' (auto-detect), 'dockerfile', 'static' (no build, serve as-is), 'dockercompose'."""
  buildPack: String = "railpack"
  """Port the application listens on inside the container."""
  port: Int
  """Environment variables injected into the container at runtime."""
  envVars: [EnvVarInput!]
  """Memory limit: 128Mi, 256Mi, 512Mi, 1024Mi, 2048Mi, 4096Mi."""
  memory: String = "256Mi"
  """CPU allocation: 0.1, 0.2, 0.25, 0.3, 0.4, 0.5, 1, 2, 3, 4 vCPUs."""
  vcpus: String = "0.25"
  """Custom build command (overrides auto-detected). Only with railpack."""
  buildCommand: String
  """Custom start command (overrides auto-detected). Only with railpack."""
  startCommand: String
  """Directory with built static files (e.g. 'dist'). With railpack, builds then serves via nginx. For Vite/React/Vue SPAs."""
  publishDirectory: String
  """Subdirectory to use as build context (e.g. 'frontend'). For monorepo deployments."""
  rootDirectory: String
  """Path to Dockerfile relative to rootDirectory. Only with dockerfile build pack."""
  dockerfilePath: String
  """Deployment region."""
  regions: [String!] = ["eu-central-1"]
}

