extend type Query {
  """List all delegated DNS zones in a workspace with their verification status."""
  dnsListZones(workspaceSlug: String): [HostedZone!]!
  """List all DNS records in a zone. Includes both user-created and managed (system) records."""
  dnsListRecords(zone: String!, workspaceSlug: String): [ZoneRecord!]!
}

extend type Mutation {
  """Create a new DNS zone. Requires manual NS delegation — the user must point NS records to ns1.ml.ink / ns2.ml.ink."""
  dnsCreateZone(zone: String!, workspaceSlug: String): CreateHostedZoneResult!
  """Verify NS delegation for a zone. Call after the user has configured NS records at their registrar."""
  dnsVerifyZone(zone: String!, workspaceSlug: String): VerifyHostedZoneResult!
  """Delete a zone and all its records. Cannot be undone."""
  dnsDeleteZone(zone: String!, workspaceSlug: String): DeleteHostedZoneResult!
  """Add a DNS record to a zone. Supported types: A, AAAA, CNAME, MX, TXT, CAA. Managed records cannot be overwritten."""
  dnsAddRecord(zone: String!, name: String!, type: String!, content: String!, ttl: Int, workspaceSlug: String): ZoneRecord!
  """Delete a DNS record. Managed records (auto-created for custom domains) cannot be deleted."""
  dnsDeleteRecord(zone: String!, recordId: ID!, workspaceSlug: String): Boolean!
  """Attach a custom domain to a service. The domain must be under a verified delegated zone. Auto-creates the required DNS records."""
  domainAdd(name: String!, domain: String!, project: String, workspaceSlug: String): DomainAddResult!
  """Remove a custom domain from a service and clean up its managed DNS records."""
  domainRemove(name: String!, project: String, workspaceSlug: String): DomainRemoveResult!
}

type DomainAddResult {
  serviceId: ID!
  domain: String!
  """'active' if zone is verified and DNS propagated, 'pending' otherwise."""
  status: String!
  message: String!
}

type DomainRemoveResult {
  serviceId: ID!
  message: String!
}

type HostedZone {
  id: ID!
  """Domain name of the zone (e.g. 'example.com')."""
  zone: String!
  """'active' when NS delegation verified, 'pending' when awaiting verification, 'error' on failure."""
  status: String!
  error: String
  """NS/TXT records required for delegation verification."""
  dnsRecords: [DNSRecord!]
  """All records in this zone (A, CNAME, MX, etc.)."""
  records: [ZoneRecord!]!
  createdAt: Time!
}

type DNSRecord {
  host: String!
  type: String!
  value: String!
  """Whether this delegation record has been verified via DNS lookup."""
  verified: Boolean!
}

type ZoneRecord {
  id: ID!
  """Record name relative to the zone (e.g. 'www', '@', 'mail.sub')."""
  name: String!
  """DNS record type: A, AAAA, CNAME, MX, TXT, CAA."""
  type: String!
  """Record value (IP address, hostname, or text content)."""
  content: String!
  """Time-to-live in seconds. Default 300."""
  ttl: Int!
  """True for records auto-managed by the system (custom domain CNAME/TXT). These cannot be modified or deleted."""
  managed: Boolean!
  createdAt: Time!
}

type CreateHostedZoneResult {
  zoneId: ID!
  zone: String!
  status: String!
  """NS and TXT records the user must configure at their registrar."""
  dnsRecords: [DNSRecord!]!
}

type VerifyHostedZoneResult {
  zoneId: ID!
  zone: String!
  status: String!
  message: String!
  dnsRecords: [DNSRecord!]!
}

type DeleteHostedZoneResult {
  zoneId: ID!
  message: String!
}
extend type Mutation {
  """Create a git repository. Use host='ink' (default) for instant private repos on Ink's internal git, or host='github' to create on GitHub (requires GitHub OAuth). Returns a git remote URL with embedded push token."""
  repoCreate(input: RepoCreateInput!): RepoCreateResult!
  """Get a temporary push token for an existing repo. Tokens expire — call again when expired. The returned gitRemote URL has the token embedded for direct git push."""
  repoGetToken(input: RepoGetTokenInput!): RepoGetTokenResult!
}

input RepoCreateInput {
  """Repository name (e.g. 'my-app'). Do not include owner prefix."""
  name: String!
  """Git host: 'ink' for internal git, 'github' for GitHub repos."""
  host: String = "ink"
  description: String
  """Project slug to scope the repo to."""
  project: String = "default"
  workspaceSlug: String
}

type RepoCreateResult {
  """The repo name to pass to serviceCreate(repo: ...). Same as the name you provided."""
  name: String!
  """Git remote URL with embedded token. Use as: git remote add ink <gitRemote> && git push ink main."""
  gitRemote: String!
  """Token expiration time. Call repoGetToken for a fresh token after expiry."""
  expiresAt: String!
  message: String!
}

input RepoGetTokenInput {
  """Repo reference as returned by repoCreate."""
  name: String!
  """Git host: 'ink' for internal git, 'github' for GitHub repos."""
  host: String = "ink"
  workspaceSlug: String
}

type RepoGetTokenResult {
  """Git remote URL with fresh embedded push token."""
  gitRemote: String!
  expiresAt: String!
}
