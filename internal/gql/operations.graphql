# ── Services ───────────────────────────────────────

query ListServices($ws: String, $proj: String) {
  serviceList(workspaceSlug: $ws, projectSlug: $proj) {
    nodes {
      name
      subdomain
      source
      status
      customDomain
      ports {
        name
        port
        protocol
        visibility
        internalEndpoint
        publicEndpoint
      }
      memory
      vcpus
      projectId
    }
    totalCount
  }
  projectList(workspaceSlug: $ws) {
    nodes {
      id
      slug
    }
  }
}

query FindService($ws: String) {
  serviceList(workspaceSlug: $ws) {
    nodes {
      id
      name
      subdomain
      source
      status
      errorMessage
      repo
      image
      branch
      commitHash
      gitProvider
      memory
      vcpus
      customDomain
      customDomainStatus
      ports {
        name
        port
        protocol
        visibility
        internalEndpoint
        publicEndpoint
      }
      envVars { key value }
      projectId
      project { slug }
      createdAt
      updatedAt
    }
  }
}

mutation CreateService($input: CreateServiceInput!) {
  serviceCreate(input: $input) {
    serviceId
    name
    status
    repo
    ports {
      name
      port
      protocol
      visibility
      internalEndpoint
      publicEndpoint
    }
  }
}

mutation UpdateService($input: UpdateServiceInput!) {
  serviceUpdate(input: $input) {
    serviceId
    name
    status
  }
}

mutation DeleteService($name: String!, $project: String, $projectId: ID, $ws: String) {
  serviceDelete(name: $name, project: $project, projectId: $projectId, workspaceSlug: $ws) {
    serviceId
    name
    message
  }
}

# ── Secrets ────────────────────────────────────────

mutation SetSecrets($input: SetSecretsInput!) {
  serviceSetSecrets(input: $input) {
    serviceId
    name
    status
  }
}

mutation DeleteSecrets($input: DeleteSecretsInput!) {
  serviceDeleteSecrets(input: $input) {
    serviceId
    name
    status
  }
}

mutation UnsetSecret($name: String!, $key: String!, $project: String, $projectId: ID, $ws: String) {
  serviceUnsetSecret(name: $name, key: $key, project: $project, projectId: $projectId, workspaceSlug: $ws) {
    serviceId
    name
    status
  }
}

# ── Logs & Metrics ─────────────────────────────────

query ServiceLogs($input: LogsInput!) {
  serviceLogs(input: $input) {
    entries {
      timestamp
      level
      message
    }
    hasMore
  }
}

query ServiceMetrics($id: ID!, $timeRange: MetricTimeRange!, $maxDataPoints: Int) {
  serviceMetrics(serviceId: $id, timeRange: $timeRange, maxDataPoints: $maxDataPoints) {
    cpuUsage {
      dataPoints { timestamp value }
    }
    memoryUsageMB {
      dataPoints { timestamp value }
    }
    networkReceiveBytesPerSec {
      dataPoints { timestamp value }
    }
    networkTransmitBytesPerSec {
      dataPoints { timestamp value }
    }
    memoryLimitMB
    cpuLimitVCPUs
  }
}

# ── Databases ──────────────────────────────────────

query ListResources($ws: String) {
  resourceList(workspaceSlug: $ws) {
    nodes {
      id
      name
      type
      status
      region
    }
    totalCount
  }
}

mutation CreateResource($input: CreateResourceInput!) {
  resourceCreate(input: $input) {
    resourceId
    name
    type
    region
    databaseUrl
    authToken
    status
  }
}

query GetResource($id: ID!) {
  resourceGet(id: $id) {
    id
    name
    type
    region
    status
    metadata { size hostname }
  }
}

query GetResourceIDByName($ws: String) {
  resourceList(workspaceSlug: $ws) {
    nodes {
      id
      name
    }
  }
}

mutation DeleteResource($name: String!, $ws: String) {
  resourceDelete(name: $name, workspaceSlug: $ws) {
    resourceId
    name
    message
  }
}

# ── Domains ────────────────────────────────────────

mutation AddDomain($name: String!, $domain: String!, $project: String, $ws: String) {
  domainAdd(name: $name, domain: $domain, project: $project, workspaceSlug: $ws) {
    serviceId
    domain
    status
    message
  }
}

mutation RemoveDomain($name: String!, $project: String, $ws: String) {
  domainRemove(name: $name, project: $project, workspaceSlug: $ws) {
    serviceId
    message
  }
}

# ── DNS ────────────────────────────────────────────

query ListDnsZones($ws: String) {
  dnsListZones(workspaceSlug: $ws) {
    id
    zone
    status
    error
  }
}

query ListDnsRecords($zone: String!, $ws: String) {
  dnsListRecords(zone: $zone, workspaceSlug: $ws) {
    id
    name
    type
    content
    ttl
    managed
  }
}

mutation AddDnsRecord($zone: String!, $name: String!, $recordType: String!, $content: String!, $ttl: Int, $ws: String) {
  dnsAddRecord(zone: $zone, name: $name, type: $recordType, content: $content, ttl: $ttl, workspaceSlug: $ws) {
    id
    name
    type
    content
    ttl
  }
}

mutation DeleteDnsRecord($zone: String!, $recordId: ID!, $ws: String) {
  dnsDeleteRecord(zone: $zone, recordId: $recordId, workspaceSlug: $ws)
}

# ── Repos ──────────────────────────────────────────

mutation CreateRepo($input: RepoCreateInput!) {
  repoCreate(input: $input) {
    name
    gitRemote
    expiresAt
    message
  }
}

mutation GetRepoToken($input: RepoGetTokenInput!) {
  repoGetToken(input: $input) {
    gitRemote
    expiresAt
  }
}

# ── Projects ──────────────────────────────────────

query ListProjects($ws: String) {
  projectList(workspaceSlug: $ws) {
    nodes {
      id
      name
      slug
    }
    totalCount
  }
}

mutation CreateProject($input: CreateProjectInput!) {
  projectCreate(input: $input) {
    id
    name
    slug
  }
}

mutation DeleteProject($slug: String!, $ws: String) {
  projectDelete(slug: $slug, workspaceSlug: $ws)
}

# ── Workspaces ─────────────────────────────────────

query ListWorkspaces {
  workspaceList {
    id
    name
    slug
    isDefault
    role
  }
}

mutation CreateWorkspace($name: String!, $slug: String!, $desc: String) {
  workspaceCreate(name: $name, slug: $slug, description: $desc) {
    id
    name
    slug
  }
}

mutation DeleteWorkspace($id: ID!) {
  workspaceDelete(id: $id)
}

query ListWorkspaceMembers($slug: String!) {
  workspaceListMembers(workspaceSlug: $slug) {
    userId
    email
    username
    displayName
    role
  }
}

mutation InviteToWorkspace($id: ID!, $user: String!, $role: String) {
  workspaceInvite(workspaceId: $id, user: $user, role: $role) {
    id
    role
    status
  }
}

query ListMyInvites {
  workspaceListMyInvites {
    id
    workspaceName
    workspaceSlug
    role
    status
  }
}

query ListWorkspaceInvites($slug: String!) {
  workspaceListInvites(workspaceSlug: $slug) {
    id
    role
    status
  }
}

mutation AcceptInvite($id: ID!) {
  workspaceAcceptInvite(inviteId: $id)
}

mutation DeclineInvite($id: ID!) {
  workspaceDeclineInvite(inviteId: $id)
}

mutation RevokeInvite($id: ID!) {
  workspaceRevokeInvite(inviteId: $id)
}

mutation RemoveWorkspaceMember($wsId: ID!, $userId: ID!) {
  workspaceRemoveMember(workspaceId: $wsId, userId: $userId)
}

# ── Chat ───────────────────────────────────────────

mutation SendChatMessage($ws: String!, $channel: String, $content: String!) {
  chatSend(workspaceSlug: $ws, channel: $channel, content: $content) {
    seq
    messageId
  }
}

query ReadChat($ws: String!, $channel: String, $cursor: Int, $limit: Int) {
  chatRead(workspaceSlug: $ws, channel: $channel, cursor: $cursor, limit: $limit) {
    messages {
      seq
      senderName
      content
      channel
      createdAt
    }
    nextCursor
    hasMore
  }
}

# ── Account ────────────────────────────────────────

query AccountStatus {
  accountStatus {
    id
    email
    githubUsername
    hasGitHubOAuth
    hasGitHubApp
    githubScopes
    defaultWorkspace
    subscriptionTier
  }
}

# ── Usage / Billing ───────────────────────────────

query UsageBillBreakdown($ws: String) {
  usageBillBreakdown(workspaceSlug: $ws) {
    memory { quantity unitPrice unit totalCents }
    cpu { quantity unitPrice unit totalCents }
    egress { quantity unitPrice unit totalCents }
    subtotal
    includedUsageCents
    planFeeCents
    currentBillCents
    periodStart
    periodEnd
  }
}
